#cloud-config
package_update: true
packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gpg
  - containerd

write_files:
  # Kernel modules required by Kubernetes
  - path: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter

  - path: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1

  # Placeholder join config — filled in by the join script below
  - path: /etc/kubernetes/kubeadm-join.yaml
    content: |
      apiVersion: kubeadm.k8s.io/v1beta3
      kind: JoinConfiguration
      nodeRegistration:
        kubeletExtraArgs:
          cloud-provider: external
      discovery:
        bootstrapToken:
          apiServerEndpoint: "REPLACE_API_ENDPOINT"
          token: "REPLACE_TOKEN"
          caCertHashes:
            - "REPLACE_CA_HASH"

runcmd:
  # Load kernel modules
  - modprobe overlay
  - modprobe br_netfilter
  - sysctl --system

  # Configure containerd
  - mkdir -p /etc/containerd
  - containerd config default | tee /etc/containerd/config.toml
  - sed -i 's/SystemdCgroup = false/SystemdCgroup = true/g' /etc/containerd/config.toml
  - systemctl restart containerd

  # Install Kubernetes packages
  - mkdir -p -m 755 /etc/apt/keyrings
  - curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.29/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  - echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.29/deb/ /' > /etc/apt/sources.list.d/kubernetes.list
  - apt-get update
  - apt-get install -y kubelet kubeadm kubectl
  - apt-mark hold kubelet kubeadm kubectl

  # NOTE: kubeadm join is intentionally NOT run automatically.
  # After getting the join token from the control plane, run:
  #   sudo /usr/local/bin/k8s-worker-join.sh <api_endpoint> <token> <ca_hash>
  - |
    cat <<'EOF' > /usr/local/bin/k8s-worker-join.sh
    #!/bin/bash
    set -e
    API_ENDPOINT=$1   # e.g. 10.0.0.4:6443
    TOKEN=$2          # from: kubeadm token create --print-join-command
    CA_HASH=$3        # from: kubeadm token create --print-join-command

    if [ -z "$API_ENDPOINT" ] || [ -z "$TOKEN" ] || [ -z "$CA_HASH" ]; then
      echo "Usage: $0 <api_endpoint> <token> <ca_hash>"
      exit 1
    fi

    sed -i "s|REPLACE_API_ENDPOINT|${API_ENDPOINT}|g" /etc/kubernetes/kubeadm-join.yaml
    sed -i "s|REPLACE_TOKEN|${TOKEN}|g"               /etc/kubernetes/kubeadm-join.yaml
    sed -i "s|REPLACE_CA_HASH|${CA_HASH}|g"           /etc/kubernetes/kubeadm-join.yaml

    kubeadm join --config /etc/kubernetes/kubeadm-join.yaml
    EOF
  - chmod +x /usr/local/bin/k8s-worker-join.sh
